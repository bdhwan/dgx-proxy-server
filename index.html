<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>DGX Spark Chat</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;height:-webkit-fill-available}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f2f2f7;color:#1c1c1e;
  display:flex;flex-direction:column;overflow:hidden;height:100vh;height:100dvh}

/* ── 헤더 ── */
header{background:#fff;padding:8px 14px;border-bottom:1px solid #e5e5ea;
  display:flex;align-items:center;gap:7px;flex-shrink:0;
  padding-top:max(8px,env(safe-area-inset-top));
  box-shadow:0 1px 3px rgba(0,0,0,.06)}
header h1{font-size:13px;font-weight:700;color:#34c759;white-space:nowrap}
.hb{display:flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:10px;font-weight:600}
.hb.g{background:#f0fff4;border:1px solid #c6f0d4;color:#1a8a3a}
.hb.m{background:#fff8f0;border:1px solid #f0d4c6;color:#a0400a}
.hb.q{background:#f0f0ff;border:1px solid #c6c6f0;color:#3a1a8a}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.dot.on{animation:pulse 2s infinite}
.dot.off{animation:pulse .8s infinite}
.hb.g .dot.on{background:#34c759}.hb.g .dot.off{background:#ff9500}
.hb.m .dot.on{background:#ff6b35}.hb.m .dot.off{background:#ff9500}
.hb.q .dot.on{background:#7c3aed}.hb.q .dot.off{background:#ff9500}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── 로딩 progress bar ── */
.pbar-wrap{height:3px;background:#f2f2f7;flex-shrink:0;overflow:hidden;display:none}
.pbar-wrap.show{display:block}
.pbar{height:3px;width:0%;transition:width .6s ease;border-radius:0 2px 2px 0}
.pane.gp .pbar{background:linear-gradient(90deg,#34c759,#76d96e)}
.pane.mp .pbar{background:linear-gradient(90deg,#ff6b35,#ff9500)}
.pane.qp .pbar{background:linear-gradient(90deg,#7c3aed,#a855f7)}
.pbar-txt{position:absolute;right:12px;font-size:9px;font-weight:700;top:8px;opacity:.6}
.pane.gp .pbar-txt{color:#1a8a3a}
.pane.mp .pbar-txt{color:#a0400a}
.pane.qp .pbar-txt{color:#3a1a8a}
.mst{margin-left:auto;display:flex;gap:5px;align-items:center}
.ms{font-size:9px;font-weight:700;padding:2px 6px;border-radius:7px}
.ms.ld{background:#fff8ee;color:#ff9500;border:1px solid #ffd599}
.ms.ok{background:#f0fff4;color:#1a8a3a;border:1px solid #c6f0d4}
.hw{display:flex;gap:5px;align-items:center;font-size:10px;margin-left:6px}
.hw span{font-weight:600}.hw .c{color:#007aff}.hw .r{color:#ff9500}

/* ── 패널 ── */
.panes{flex:1;display:flex;overflow:hidden;position:relative;min-height:0}
.pane{flex:1;display:flex;flex-direction:column;overflow:hidden;border-right:1px solid #e5e5ea;background:#f2f2f7}
.pane:last-child{border-right:none}

/* ── 패널 헤더 ── */
.ph{padding:8px 12px;font-size:11px;font-weight:700;display:flex;align-items:center;gap:5px;flex-shrink:0;background:#fff;border-bottom:1px solid #e5e5ea}
.ph.g{color:#1a8a3a;border-bottom:2px solid #34c759}
.ph.m{color:#a0400a;border-bottom:2px solid #ff6b35}
.ph.q{color:#3a1a8a;border-bottom:2px solid #7c3aed}
.ph .ep{font-size:9px;font-family:monospace;opacity:.35;margin-left:3px}
.ph .ps{margin-left:auto;font-size:9px;font-weight:400;color:#8e8e93}

/* ── 시스템 토글 ── */
.sys-wrap{background:#f9f9fb;border-bottom:1px solid #e5e5ea;flex-shrink:0;overflow:hidden;max-height:0;transition:max-height .25s ease}
.sys-wrap.open{max-height:100px}
.sys-wrap textarea{width:100%;background:#fff;border:none;color:#3a3a3c;padding:8px 12px;font-size:13px;resize:none;outline:none;font-family:inherit;height:60px;line-height:1.4;display:block}
.sys-btn{background:none;border:none;font-size:9px;font-weight:700;letter-spacing:.7px;cursor:pointer;padding:0 2px;text-transform:uppercase;opacity:.45}
.pane.gp .sys-btn{color:#1a8a3a}
.pane.mp .sys-btn{color:#a0400a}
.pane.qp .sys-btn{color:#3a1a8a}

/* ── 채팅 ── */
.chat{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px;overscroll-behavior:contain}
.chat::-webkit-scrollbar{width:3px}
.chat::-webkit-scrollbar-thumb{background:#c7c7cc;border-radius:2px}
.msg.u{align-self:flex-end;max-width:82%}
.msg.a{align-self:flex-start;width:100%}
.bubble{padding:9px 13px;border-radius:16px;font-size:14px;line-height:1.65;word-break:break-word}
.msg.u .bubble{background:#007aff;color:#fff;border-bottom-right-radius:4px}
.msg.a .bubble{background:#fff;border:1px solid #e5e5ea;border-bottom-left-radius:4px;color:#1c1c1e;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.bubble p{margin:0 0 5px}.bubble p:last-child{margin-bottom:0}
.bubble pre{background:#f2f2f7;border-radius:8px;padding:9px 11px;overflow-x:auto;margin:6px 0;font-size:12px;border:1px solid #e5e5ea}
.bubble code{font-family:'Menlo','Monaco',monospace;font-size:12px}
.bubble :not(pre)>code{background:#f2f2f7;padding:1px 4px;border-radius:4px;color:#c0392b}
.bubble ul,.bubble ol{padding-left:18px;margin:4px 0}
.streaming::after{content:'▋';animation:blink .6s infinite;color:#007aff}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* ── 사고 ── */
.think{margin-bottom:7px;border-radius:9px;border:1px solid #e5e5ea;overflow:hidden}
.think summary{cursor:pointer;padding:5px 10px;font-size:10px;color:#8e8e93;background:#f9f9fb;list-style:none;user-select:none}
.think-body{padding:7px 10px;font-size:11px;color:#8e8e93;white-space:pre-wrap;font-family:monospace;max-height:180px;overflow-y:auto;border-top:1px solid #e5e5ea;line-height:1.5}

/* ── 타이핑 ── */
.typing .bubble{display:flex;gap:5px;align-items:center;padding:11px 13px}
.typing .bubble span{width:7px;height:7px;border-radius:50%;background:#c7c7cc;animation:bounce 1.2s infinite}
.typing .bubble span:nth-child(2){animation-delay:.2s}
.typing .bubble span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}

/* ── 이미지 행 ── */
.imgrow{background:#fff;border-top:1px solid #e5e5ea;padding:7px 10px;display:none;gap:7px;align-items:center;flex-shrink:0}
.imgrow.show{display:flex}
.ith{position:relative}
.ith img{height:52px;max-width:85px;border-radius:8px;border:2px solid #7c3aed;object-fit:cover}
.ith .idel{position:absolute;top:-5px;right:-5px;background:#ff3b30;border:none;border-radius:50%;color:#fff;width:18px;height:18px;font-size:10px;cursor:pointer;line-height:18px;text-align:center}
.icnt{font-size:10px;color:#8e8e93}

/* ── 입력창 ── */
.pi{background:#fff;border-top:1px solid #e5e5ea;padding:8px;display:flex;gap:5px;align-items:flex-end;flex-shrink:0;
  padding-bottom:max(8px,env(safe-area-inset-bottom));
  box-shadow:0 -1px 3px rgba(0,0,0,.04)}
.pi textarea{flex:1;background:#f2f2f7;border:1px solid #e5e5ea;border-radius:20px;color:#1c1c1e;
  padding:9px 14px;font-size:16px;resize:none;outline:none;font-family:inherit;
  min-height:38px;max-height:100px;line-height:1.4;transition:border-color .15s}
.pane.gp .pi textarea:focus{border-color:#34c759;background:#fff}
.pane.mp .pi textarea:focus{border-color:#ff6b35;background:#fff}
.pane.qp .pi textarea:focus{border-color:#7c3aed;background:#fff}
.ibtn{border:none;border-radius:50%;width:38px;height:38px;min-width:38px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.ibtn:disabled{opacity:.35;cursor:not-allowed}
.ibtn.cl{background:#f2f2f7;color:#8e8e93}.ibtn.cl:hover{background:#ffe5e5;color:#ff3b30}
.ibtn.at{background:#fff3ee;color:#ff6b35}.ibtn.at:hover{background:#ffe0d0}
.pane.gp .ibtn.go{background:#34c759}
.pane.mp .ibtn.go{background:#ff6b35}
.pane.qp .ibtn.go{background:#7c3aed}
.ibtn svg{width:14px;height:14px;fill:#fff}
.ibtn.cl svg,.ibtn.at svg{fill:currentColor}

/* ── 하단바 ── */
.bbar{background:#fff;border-top:1px solid #e5e5ea;padding:5px 14px;
  display:flex;gap:6px;align-items:center;flex-shrink:0}
.bbar button{background:#f2f2f7;border:1px solid #e5e5ea;color:#8e8e93;padding:3px 10px;border-radius:7px;font-size:10px;cursor:pointer}
.bbar button:hover{border-color:#ff3b30;color:#ff3b30}
.spds{margin-left:auto;font-size:10px;display:flex;gap:12px}
.v.vg{color:#34c759;font-weight:700}
.v.vm{color:#ff6b35;font-weight:700}
.v.vq{color:#7c3aed;font-weight:700}

/* ── 모바일 탭 ── */
.mob-tabs{display:none;background:#fff;border-top:1px solid #e5e5ea;flex-shrink:0;
  padding-bottom:env(safe-area-inset-bottom)}
.mob-tabs button{flex:1;background:none;border:none;padding:9px 4px 7px;
  display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer}
.mob-tabs .ti{font-size:20px;line-height:1}
.mob-tabs .tl{font-size:10px;font-weight:600;color:#8e8e93}
.mob-tabs .mob-spd{font-size:9px;color:#c7c7cc}
.mob-tabs .td{width:4px;height:4px;border-radius:50%;background:transparent;transition:background .2s}
.mob-tabs button.ag .tl{color:#34c759}.mob-tabs button.ag .td{background:#34c759}
.mob-tabs button.am .tl{color:#ff6b35}.mob-tabs button.am .td{background:#ff6b35}
.mob-tabs button.aq .tl{color:#7c3aed}.mob-tabs button.aq .td{background:#7c3aed}


/* ── 중단 버튼 ── */
.ibtn.stop{background:#ff3b30;animation:pulseRed .8s infinite}
@keyframes pulseRed{0%,100%{background:#ff3b30}50%{background:#cc2200}}

/* ── 드래그 오버레이 ── */
.drag-overlay{position:absolute;inset:0;z-index:100;display:none;
  align-items:center;justify-content:center;flex-direction:column;gap:12px;
  background:rgba(255,107,53,.12);border:3px dashed #ff6b35;border-radius:4px;pointer-events:none}
.drag-overlay.show{display:flex}
.drag-overlay .di{font-size:48px;line-height:1}
.drag-overlay .dt{font-size:15px;font-weight:700;color:#ff6b35}

/* ── 복사 버튼 ── */
.msg-actions{display:flex;justify-content:flex-end;margin-top:5px;gap:5px}
.copy-btn{background:none;border:1px solid #e5e5ea;border-radius:7px;color:#8e8e93;
  font-size:10px;padding:3px 9px;cursor:pointer;display:flex;align-items:center;gap:4px;
  transition:all .15s}
.copy-btn:hover{background:#f2f2f7;border-color:#c7c7cc;color:#3a3a3c}
.copy-btn.copied{background:#f0fff4;border-color:#c6f0d4;color:#1a8a3a}
.copy-btn svg{width:11px;height:11px;fill:currentColor}


/* ── 반응형 ── */
@media(max-width:767px){
  header .hb{display:none}
  header .hw{display:none}
  .panes{position:relative}
  .pane{position:absolute!important;inset:0;display:none!important}
  .pane.active{display:flex!important}
  .ph .ep{display:none}
  .bbar{display:none}
  .mob-tabs{display:flex}
}
</style>
</head>
<body>

<header>
  <h1>⚡ DGX Spark</h1>
  <div class="hb g"><div class="dot off" id="dot-g"></div>GPT-120B</div>
  <div class="hb m"><div class="dot off" id="dot-m"></div>Gemma3-27B</div>
  <div class="mst">
    <span class="ms ld" id="ms-g">⏳</span>
    <span class="ms ld" id="ms-m">⏳</span>
    </div>
  <div class="hw">
    <span style="font-size:9px;color:#c7c7cc">M</span><span class="c" id="mcpu">—</span><span class="r" id="mram">—</span>
    <span style="color:#e5e5ea">|</span>
    <span style="font-size:9px;color:#c7c7cc">W</span><span class="c" id="wcpu">—</span><span class="r" id="wram">—</span>
  </div>
</header>

<div class="panes" id="panes">

  <!-- GPT-OSS-120B -->
  <div class="pane gp active" id="pane-g">
    <div class="ph g">🟢 GPT-OSS-120B<span class="ep">100.87.77.45:8000</span>
      <button class="sys-btn" onclick="toggleSys('g')">SYS▾</button>
      <span class="ps" id="ps-g">대기 중</span></div>
    <div class="sys-wrap" id="sw-g"><textarea id="sys-g" placeholder="시스템 프롬프트..." oninput="localStorage.setItem('sys-g',this.value)"></textarea></div>
    <div class="chat" id="chat-g"></div>
    <div class="pi">
      <button class="ibtn cl" onclick="clearPane('g')"><svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg></button>
      <textarea id="in-g" placeholder="GPT-OSS-120B..."></textarea>
      <button class="ibtn go" id="sb-g" onclick="sendOne('g')"><svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg></button>
    </div>
  </div>

  <!-- Gemma3-27B -->
  <div class="pane mp" id="pane-m" style="position:relative">
    <div class="drag-overlay" id="drag-ov-m"><span class="di">🖼️</span><span class="dt">이미지를 여기에 놓으세요</span></div>
    <div class="ph m">🟠 Gemma3-27B<span class="ep">100.95.83.78:11434 (Ollama)</span>
      <button class="sys-btn" onclick="toggleSys('m')">SYS▾</button>
      <span class="ps" id="ps-m">연결 확인 중...</span></div>
    <div class="sys-wrap" id="sw-m"><textarea id="sys-m" placeholder="시스템 프롬프트..." oninput="localStorage.setItem('sys-m',this.value)"></textarea></div>
    <div class="pbar-wrap" id="pb-m"><div class="pbar" id="pbar-m"></div></div>
    <div class="chat" id="chat-m"></div>
    <div class="imgrow" id="imgrow-m"></div>
    <div class="pi">
      <button class="ibtn cl" onclick="clearPane('m')"><svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg></button>
      <input type="file" id="fi-m" accept="image/*" multiple style="display:none" onchange="onFiles(event)">
      <button class="ibtn at" onclick="document.getElementById('fi-m').click()" title="이미지 첨부">
        <svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
      </button>
      <textarea id="in-m" placeholder="Gemma3... 이미지 첨부/드래그/Ctrl+V 가능"></textarea>
      <button class="ibtn go" id="sb-m" onclick="sendOne('m')"><svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg></button>
    </div>
  </div>

  

</div>

<div class="bbar">
  <button onclick="clearAll()">🗑 전체 초기화</button>
  <div class="spds">
    <span>🟢 <span class="v vg" id="spd-g">—</span> t/s</span>
    <span>🟠 <span class="v vm" id="spd-m">—</span> t/s</span>
    t/s</span>
  </div>
</div>

<div class="mob-tabs">
  <button id="tab-g" onclick="switchTab('g')">
    <span class="ti">🟢</span><span class="tl">GPT-120B</span>
    <span class="mob-spd" id="mspd-g">—</span><span class="td"></span>
  </button>
  <button id="tab-m" onclick="switchTab('m')">
    <span class="ti">🟠</span><span class="tl">Gemma3</span>
    <span class="mob-spd" id="mspd-m">—</span><span class="td"></span>
  </button>
  </div>

<script>
marked.setOptions({breaks:true,gfm:true});

const EP={
  g:{base:'http://100.95.83.78:8000/v1',model:'gpt-oss-120b'},
  m:{base:'http://100.87.77.45:8000/v1',model:'gemma3-27b'}
};
const STATUS='http://100.87.77.45:9091/';
const KEYS=['g','m'];

let hist={g:[],m:[]};
const abortCtrl={g:null,m:null};
const modelReady={g:false,m:false,q:false};
let imgs=[];

(()=>{
  KEYS.forEach(k=>{
    const s=localStorage.getItem('sys-'+k);
    if(s)document.getElementById('sys-'+k).value=s;
    try{hist[k]=JSON.parse(localStorage.getItem('h'+k.toUpperCase())||'[]');}catch(e){}
    const c=localStorage.getItem('c'+k.toUpperCase());
    if(c)document.getElementById('chat-'+k).innerHTML=c;
    document.getElementById('chat-'+k).scrollTop=99999;
  });
})();

function save(){
  KEYS.forEach(k=>{
    localStorage.setItem('h'+k.toUpperCase(),JSON.stringify(hist[k]));
    localStorage.setItem('c'+k.toUpperCase(),document.getElementById('chat-'+k).innerHTML);
  });
}

async function refreshStatus(){
  try{
    const d=await fetch(STATUS,{signal:AbortSignal.timeout(3000)}).then(r=>r.json());
    if(d.worker){t('wcpu',d.worker.cpu+'%');t('wram',d.worker.mem_used+'G');}
    if(d.manager){t('mcpu',d.manager.cpu+'%');t('mram',d.manager.mem_used+'G');}
    // Worker 모델 로딩 진행
    if(d.worker?.models){
      const gm=d.worker.models.gemma;
      const qm=d.worker.models.qwen_vl;
      if(gm&&!gm.ready)updateProgress('m', gm.loading);
      else if(gm?.ready){document.getElementById('pb-m').className='pbar-wrap';}
      if(qm&&!qm.ready)updateProgress('q', qm.loading);
      else if(qm?.ready){document.getElementById('pb-q').className='pbar-wrap';}
    }
    // Manager 모델 로딩
    if(d.model&&!d.model.ready&&d.model.loading_pct!=null){
      updateProgress('g',{done:d.model.loading_pct,total:100,pct:d.model.loading_pct});
    }
  }catch(e){}
}
refreshStatus();setInterval(refreshStatus,3000);
function t(id,v){const e=document.getElementById(id);if(e)e.textContent=v;}

function updateProgress(k, loading){
  const wrap=document.getElementById('pb-'+k);
  const bar=document.getElementById('pbar-'+k);
  if(!wrap||!bar)return;
  if(!loading||loading.pct>=100){wrap.className='pbar-wrap';return;}
  wrap.className='pbar-wrap show';
  bar.style.width=loading.pct+'%';
  setPst(k,'⏳ '+loading.done+'/'+loading.total+' ('+loading.pct+'%)');
}

async function ping(k){
  try{
    const d=await fetch(k==='g'?'http://100.87.77.45:9091/proxy/models':EP[k].base+'/models',{signal:AbortSignal.timeout(5000)}).then(r=>r.json());
    if(d.data?.length){
      modelReady[k]=true;
      document.getElementById('dot-'+k).className='dot on';
      t('ms-'+k,'✅');
      document.getElementById('ms-'+k).className='ms ok';
      setPst(k,'✅ 준비됨');return;
    }
  }catch(e){}
  modelReady[k]=false;
  document.getElementById('dot-'+k).className='dot off';
  document.getElementById('ms-'+k).className='ms ld';
  setTimeout(()=>ping(k),8000);
}
KEYS.forEach(k=>ping(k));

function setPst(k,txt){
  const e=document.getElementById('ps-'+k);if(!e)return;
  e.textContent=txt;
  e.style.color=txt.includes('✅')?'#34c759':txt.includes('❌')?'#ff3b30':txt.includes('🔄')?'#ff9500':'#8e8e93';
}
function setSpd(k,v){t('spd-'+k,v);t('mspd-'+k,v==='—'?'—':v);}

function toggleSys(k){
  const w=document.getElementById('sw-'+k);w.classList.toggle('open');
  if(w.classList.contains('open'))document.getElementById('sys-'+k).focus();
}

// 이미지 (Qwen-VL용)
function resizeImg(dataUrl){
  return new Promise(res=>{
    const i=new Image();
    i.onload=()=>{
      let{width:w,height:h}=i;const max=1024;
      if(w>max||h>max){if(w>h){h=Math.round(h*max/w);w=max}else{w=Math.round(w*max/h);h=max}}
      const c=document.createElement('canvas');c.width=w;c.height=h;
      c.getContext('2d').drawImage(i,0,0,w,h);
      res(c.toDataURL('image/jpeg',.85));
    };i.src=dataUrl;
  });
}
function addImg(url){if(imgs.length>=4){alert('최대 4장');return;}resizeImg(url).then(r=>{imgs.push(r);renderImgs();});}
function removeImg(i){imgs.splice(i,1);renderImgs();}
function onFiles(e){Array.from(e.target.files).slice(0,4-imgs.length).forEach(f=>{const r=new FileReader();r.onload=ev=>addImg(ev.target.result);r.readAsDataURL(f);});e.target.value='';}
document.addEventListener('paste',e=>{for(const it of(e.clipboardData?.items||[])){if(it.type.startsWith('image/')){const f=it.getAsFile();const r=new FileReader();r.onload=ev=>addImg(ev.target.result);r.readAsDataURL(f);if(currentTab==='q')document.getElementById('in-m').focus();break;}}});
function renderImgs(){
  const w=document.getElementById('imgrow-m');
  if(!imgs.length){w.className='imgrow';w.innerHTML='';return;}
  w.className='imgrow show';
  w.innerHTML=imgs.map((s,i)=>`<div class="ith"><img src="${s}"><button class="idel" onclick="removeImg(${i})">✕</button></div>`).join('')+`<span class="icnt">${imgs.length}/4</span>`;
}

KEYS.forEach(k=>{
  const ta=document.getElementById('in-'+k);if(!ta)return;
  ta.addEventListener('keydown',e=>{
    if(e.key==='Enter'&&!e.shiftKey&&!e.isComposing){e.preventDefault();sendOne(k);return;}
    setTimeout(()=>{ta.style.height='auto';ta.style.height=Math.min(ta.scrollHeight,110)+'px';},0);
  });
});
if(window.visualViewport){
  window.visualViewport.addEventListener('resize',()=>{setTimeout(()=>{const c=document.getElementById('chat-'+currentTab);if(c)c.scrollTop=99999;},100);});
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function addUserBubble(cid,text,imgUrls){
  const el=document.getElementById(cid);
  const w=document.createElement('div');w.className='msg u';
  let html='<div class="bubble">'+esc(text);
  if(imgUrls?.length){
    html+='<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:6px">';
    imgUrls.forEach(u=>{html+=`<img src="${u}" style="max-height:75px;max-width:110px;border-radius:7px;object-fit:cover">`;});
    html+='</div>';
  }
  html+='</div>';w.innerHTML=html;el.appendChild(w);el.scrollTop=99999;
}
function addTyping(cid){
  const id='ty-'+cid;document.getElementById(id)?.remove();
  const el=document.getElementById(cid);
  const w=document.createElement('div');w.className='msg a typing';w.id=id;
  w.innerHTML='<div class="bubble"><span></span><span></span><span></span></div>';
  el.appendChild(w);el.scrollTop=99999;
}
function makeBubble(cid){
  document.getElementById('ty-'+cid)?.remove();
  const el=document.getElementById(cid);
  const w=document.createElement('div');w.className='msg a';
  const b=document.createElement('div');b.className='bubble streaming';
  w.appendChild(b);el.appendChild(w);return b;
}
function renderBubble(b,thinking,content){
  let html='';
  if(thinking)html+='<details class="think" open><summary>💭 사고 과정</summary><div class="think-body">'+esc(thinking)+'</div></details>';
  html+=marked.parse(content||'');b.innerHTML=html;
}

async function stream(k,messages){
  const cid='chat-'+k;addTyping(cid);
  const t0=Date.now();let rawC='',rawT='',toks=0;
  try{
    abortCtrl[k]=new AbortController();
    const res=await fetch(EP[k].base+'/chat/completions',{
      signal:abortCtrl[k].signal,
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:EP[k].model,messages,stream:true,max_tokens:4096,temperature:0.7})
    });
    if(!res.ok)throw new Error('HTTP '+res.status+': '+await res.text());
    const bubble=makeBubble(cid);const chatEl=document.getElementById(cid);
    const reader=res.body.getReader();const dec=new TextDecoder();let buf='';
    while(true){
      const{done,value}=await reader.read();if(done)break;
      buf+=dec.decode(value,{stream:true});
      const lines=buf.split('\n');buf=lines.pop();
      for(const line of lines){
        if(!line.startsWith('data: '))continue;
        const data=line.slice(6).trim();if(data==='[DONE]')break;
        try{
          const delta=JSON.parse(data).choices?.[0]?.delta;
          const c=delta?.content||'',tt=delta?.reasoning||delta?.reasoning_content||'';
          if(c){rawC+=c;toks++;}if(tt){rawT+=tt;toks++;}
          if(c||tt){
            renderBubble(bubble,rawT,rawC);bubble.classList.add('streaming');
            chatEl.scrollTop=99999;
            const el2=(Date.now()-t0)/1000;
            if(el2>.5){const s=(toks/el2).toFixed(1);setSpd(k,s);setPst(k,'🔄 '+s+' tok/s');}
          }
        }catch(e){}
      }
    }
    renderBubble(bubble,rawT,rawC);bubble.classList.remove('streaming');
    const tps=(toks/((Date.now()-t0)/1000)).toFixed(1);
    setSpd(k,tps);setPst(k,'✅ '+tps+' tok/s');
    // 복사 버튼 추가 (g 패널)
    if(k==='g'&&rawC){
      const act=document.createElement('div');act.className='msg-actions';
      const cbtn=document.createElement('button');cbtn.className='copy-btn';
      cbtn.innerHTML='<svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>복사';
      cbtn.onclick=()=>{
        const ok=()=>{cbtn.className='copy-btn copied';cbtn.innerHTML='<svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>복사됨';setTimeout(()=>{cbtn.className='copy-btn';cbtn.innerHTML='<svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>복사';},2000);};
        if(navigator.clipboard&&navigator.clipboard.writeText){
          navigator.clipboard.writeText(rawC).then(ok).catch(()=>fallbackCopy(rawC,ok));
        }else{fallbackCopy(rawC,ok);}
      };
      act.appendChild(cbtn);
      bubble.parentElement.appendChild(act);
    }
    return rawC||rawT;
  }catch(err){
    document.getElementById('ty-'+cid)?.remove();
    if(err.name==='AbortError'){setPst(k,'⏹ 중단됨');return rawC||null;}
    const b=makeBubble(cid);b.classList.remove('streaming');
    b.innerHTML='<pre style="color:#ff3b30;font-size:11px;white-space:pre-wrap;background:#fff5f5;padding:10px;border-radius:8px">❌ 오류\n'+esc(err.message)+'</pre>';
    setPst(k,'❌ 오류');return null;
  }
}

async function sendOne(k){
  const ta=document.getElementById('in-'+k);
  const text=ta.value.trim();
  const hasImg=(k==='m'&&imgs.length>0);
  if(!text&&!hasImg)return;
  const btn=document.getElementById('sb-'+k);if(btn.disabled)return;
  if(!modelReady[k]){
    const el=document.getElementById('chat-'+k);
    const w=document.createElement('div');w.className='msg a';
    const b=document.createElement('div');b.className='bubble';
    b.style.cssText='background:#fff8ee;border:1px solid #ffd599;color:#ff9500';
    b.textContent='⏳ 모델 준비 중입니다. 잠시 후 다시 시도해주세요.';
    w.appendChild(b);el.appendChild(w);el.scrollTop=99999;return;
  }
  ta.value='';ta.style.height='auto';
  // 전송 버튼 → 중단 버튼
  btn.innerHTML='<svg viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12"/></svg>';
  btn.className='ibtn stop';
  btn.onclick=()=>stopStream(k);
  btn.disabled=false;
  const sentImgs=[...imgs];
  if(k==='m'&&imgs.length){imgs=[];renderImgs();}
  addUserBubble('chat-'+k,text||(hasImg?'[이미지 '+sentImgs.length+'장]':''),hasImg?sentImgs:[]);
  let content=text;
  if(k==='m'&&sentImgs.length){
    content=[{type:'text',text:text||'이미지를 분석해줘.'},...sentImgs.map(u=>({type:'image_url',image_url:{url:u}}))];
  }
  // user push 전: 마지막이 user면 dummy assistant 삽입
  const hk=hist[k];
  if(hk.length>0 && hk[hk.length-1].role==='user'){
    hk.push({role:'assistant',content:'[이전 답변 없음]'});
  }
  hk.push({role:'user',content});
  const sys=document.getElementById('sys-'+k).value.trim();
  const msgs=sys?[{role:'system',content:sys},...hk]:[...hk];
  const r=await stream(k,msgs);
  if(r)hist[k].push({role:'assistant',content:r});
  save();
  // 버튼 원래대로
  btn.innerHTML='<svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>';
  btn.className='ibtn go';
  btn.onclick=()=>sendOne(k);
  btn.disabled=false;
  abortCtrl[k]=null;
}


function stopStream(k){
  if(abortCtrl[k]){abortCtrl[k].abort();}
  const btn=document.getElementById('sb-'+k);
  if(btn){
    btn.innerHTML='<svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>';
    btn.className='ibtn go';
    btn.onclick=()=>sendOne(k);
  }
}

function clearPane(k){
  hist[k]=[];imgs=k==='m'?[]:imgs;if(k==='m')renderImgs();
  localStorage.removeItem('h'+k.toUpperCase());localStorage.removeItem('c'+k.toUpperCase());
  document.getElementById('chat-'+k).innerHTML='';
  setSpd(k,'—');setPst(k,'대기 중');
}




function fallbackCopy(text,cb){
  const ta=document.createElement('textarea');
  ta.value=text;ta.style.cssText='position:fixed;top:-9999px;left:-9999px';
  document.body.appendChild(ta);ta.focus();ta.select();
  try{document.execCommand('copy');if(cb)cb();}catch(e){}
  document.body.removeChild(ta);
}
function clearAll(){KEYS.forEach(k=>clearPane(k));}

let currentTab='g';
function switchTab(k){
  currentTab=k;
  KEYS.forEach(t=>{
    document.getElementById('pane-'+t)?.classList.toggle('active',t===k);
    const b=document.getElementById('tab-'+t);
    if(b)b.className=(t===k)?'a'+t:'';
  });
  setTimeout(()=>{const c=document.getElementById('chat-'+k);if(c)c.scrollTop=99999;},50);
}
switchTab('g');




(()=>{
  const el=document.getElementById('panes');if(!el)return;
  const tabs=['g','m','q'];
  let sx=0,sy=0;
  el.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;},{passive:true});
  el.addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-sx;
    const dy=e.changedTouches[0].clientY-sy;
    if(Math.abs(dy)>Math.abs(dx)||Math.abs(dx)<60)return;
    const idx=tabs.indexOf(currentTab);
    if(dx<0&&idx<tabs.length-1)switchTab(tabs[idx+1]);
    else if(dx>0&&idx>0)switchTab(tabs[idx-1]);
  },{passive:true});
})();
</script>
